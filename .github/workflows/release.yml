name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: symman.exe
            archive: symman-x86_64-pc-windows-msvc.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: symman
            archive: symman-x86_64-unknown-linux-gnu.tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            bin: symman
            archive: symman-x86_64-apple-darwin.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            bin: symman
            archive: symman-aarch64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.bin }} `
            -DestinationPath ${{ matrix.archive }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czvf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.bin }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
